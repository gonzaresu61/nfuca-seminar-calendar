name: Update seminar events

on:
  schedule:
    # 毎週日曜 09:00 JST (00:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Run scraper
        run: python scripts/update_events.py

      - name: Read summary
        id: summary
        run: |
          echo "changed=$(python -c "import json;print(json.load(open('update_summary.json'))['changed'])")" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        if: steps.summary.outputs.changed == 'True'
        id: body
        run: |
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import json
          data = json.load(open('update_summary.json'))
          lines = ["## 新しく検出されたお知らせ", ""]
          for it in data["new_items"]:
              lines.append(f"- [{it['title']}]({it['url']})")
          if data["needs_review"]:
              lines.append("")
              lines.append("## ⚠️ 要確認（自動抽出の確信度が低い項目）")
              for r in data["needs_review"]:
                  lines.append(f"- {r}")
          lines.append("")
          lines.append("seminar.html を自動巡回して検出しました。内容を確認のうえマージしてください。")
          body = "\n".join(lines)
          print("body<<EOF_BODY")
          print(body)
          print("EOF_BODY")
          EOF

      - name: Create Pull Request
        if: steps.summary.outputs.changed == 'True'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "seminar.html の新着イベントを反映"
          title: "セミナー情報 自動更新 (${{ github.run_id }})"
          body: ${{ steps.body.outputs.body }}
          branch: auto-update-events
          delete-branch: true
