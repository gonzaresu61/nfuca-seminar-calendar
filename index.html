<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学生協東京ブロック セミナーカレンダー</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: #f5f7fa;
    color: #1e293b;
    min-height: 100vh;
    padding: 16px;
  }

  .app { max-width: 900px; margin: 0 auto; }

  .header {
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    color: white;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
  .header-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  .source-link {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    margin-top: 4px;
    display: inline-block;
  }
  .source-link:hover { color: white; text-decoration: underline; }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .nav-btn {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 16px;
    color: #475569;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
  .month-label { font-size: 20px; font-weight: 700; color: #1e293b; }

  .calendar {
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 16px;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }
  .weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 0;
    color: #94a3b8;
    letter-spacing: 0.05em;
  }
  .weekday:first-child { color: #ef4444; }
  .weekday:last-child { color: #3b82f6; }

  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day {
    height: 90px;
    overflow: hidden;
    border-radius: 10px;
    padding: 4px 5px;
    background: #f8fafc;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .day:hover { background: #f1f5f9; border-color: #e2e8f0; }
  .day.today { background: #eff6ff; border-color: #bfdbfe; }
  .day.other-month { background: transparent; opacity: 0.4; }

  .day-num {
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    margin-bottom: 3px;
  }
  .day.today .day-num {
    background: #3b82f6;
    color: white;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .day-num.sun { color: #ef4444; }
  .day-num.sat { color: #3b82f6; }

  .event-pill {
    display: block;
    font-size: 9px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 4px;
    margin-bottom: 2px;
    cursor: pointer;
    white-space: normal;
    word-break: break-all;
    line-height: 1.4;
    transition: opacity 0.15s;
  }
  .event-pill:hover { opacity: 0.8; }

  .cat-tokyo    { background: #dbeafe; color: #1e40af; }
  .cat-zenkoku  { background: #fef3c7; color: #92400e; }
  .cat-minami   { background: #d1fae5; color: #065f46; }
  .cat-sobu     { background: #ede9fe; color: #4c1d95; }
  .cat-musashino{ background: #fee2e2; color: #7f1d1d; }
  .cat-kitakou  { background: #cffafe; color: #164e63; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: #475569;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .events-section {
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .events-title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 12px; }

  .event-card {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #f1f5f9;
    cursor: pointer;
    transition: background 0.1s;
  }
  .event-card:last-child { border-bottom: none; }
  .event-card:hover { background: #f8fafc; margin: 0 -8px; padding: 10px 8px; border-radius: 8px; }

  .event-date-block { min-width: 44px; text-align: center; }
  .event-month { font-size: 10px; color: #94a3b8; font-weight: 600; }
  .event-day-num { font-size: 22px; font-weight: 800; color: #1e293b; line-height: 1; }
  .event-weekday { font-size: 10px; color: #94a3b8; }

  .event-info { flex: 1; }
  .event-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    margin-bottom: 4px;
  }
  .event-name { font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.4; margin-bottom: 2px; }
  .event-meta { font-size: 11px; color: #64748b; }
  .event-link {
    font-size: 11px;
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
  }
  .event-link:hover { text-decoration: underline; }

  .deadline-badge {
    background: #fef2f2;
    color: #dc2626;
    border: 1px solid #fecaca;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }

  .updated-note { font-size: 11px; color: #94a3b8; text-align: right; margin-top: 12px; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 24px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; line-height: 1.4; }
  .modal-row { display: flex; gap: 8px; margin-bottom: 7px; font-size: 13px; color: #475569; }
  .modal-label { font-weight: 600; color: #1e293b; min-width: 48px; }
  .modal-link {
    display: inline-block;
    margin-top: 14px;
    background: #3b82f6;
    color: white;
    padding: 8px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
  }
  .modal-link:hover { background: #2563eb; }
  .modal-close {
    float: right;
    background: #f1f5f9;
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    color: #64748b;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="header-title">📅 大学生協東京ブロック<br>セミナーカレンダー</div>
      <div class="header-sub">毎週日曜日更新</div>
      <a class="source-link" href="https://www.nfuca-tokyo.jp/seminar.html" target="_blank" rel="noopener noreferrer">
        データ元: nfuca-tokyo.jp →
      </a>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="cal-nav">
    <button class="nav-btn" onclick="prevMonth()">◀</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-btn" onclick="nextMonth()">▶</button>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">日</div>
      <div class="weekday">月</div>
      <div class="weekday">火</div>
      <div class="weekday">水</div>
      <div class="weekday">木</div>
      <div class="weekday">金</div>
      <div class="weekday">土</div>
    </div>
    <div class="days" id="calDays"></div>
  </div>

  <div class="events-section">
    <div class="events-title">📋 直近のイベント一覧</div>
    <div id="eventList"></div>
    <div class="updated-note" id="updatedNote"></div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕ 閉じる</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const LAST_UPDATED = '2026年7月1日';

const CATEGORIES = {
  tokyo:     { label: '東京ブロック',   cssClass: 'cat-tokyo',     dotColor: '#3b82f6' },
  zenkoku:   { label: '連合会・共済連', cssClass: 'cat-zenkoku',   dotColor: '#f59e0b' },
  minami:    { label: '南エリア',       cssClass: 'cat-minami',    dotColor: '#10b981' },
  sobu:      { label: '総武エリア',     cssClass: 'cat-sobu',      dotColor: '#8b5cf6' },
  musashino: { label: '武蔵野エリア',   cssClass: 'cat-musashino', dotColor: '#ef4444' },
  kitakou:   { label: '北甲エリア',     cssClass: 'cat-kitakou',   dotColor: '#06b6d4' },
};

const EVENTS = [
  { date:'2026-07-01', name:'⚠️ 締切：南エリアミーティング申込', time:'23:59締切', venue:'', category:'minami', url:'https://www.nfuca-tokyo.jp/news/news_detail_2458.html', isDeadline:true },
  { date:'2026-07-03', name:'⚠️ 締切：新学期スタート会議2026申込', time:'23:59締切', venue:'', category:'tokyo', url:'https://www.nfuca-tokyo.jp/news/news_detail_2471.html', isDeadline:true },
  { date:'2026-07-05', name:'第1回 南エリアミーティング', time:'12:30〜17:30', venue:'東京都立大学 南大沢キャンパス 食堂', category:'minami', url:'https://www.nfuca-tokyo.jp/news/news_detail_2458.html' },
  { date:'2026-07-06', name:'⚠️ 締切：全国環境セミナー2026申込', time:'17:00締切', venue:'', category:'zenkoku', url:'https://www.nfuca-tokyo.jp/news/news_detail_2469.html', isDeadline:true },
  { date:'2026-07-11', name:'新学期スタート会議2026 (26SSK)', time:'13:30〜17:30（午前：第3回ブロック運営委員会）', venue:'東京海洋大学 品川キャンパス', category:'tokyo', url:'https://www.nfuca-tokyo.jp/news/news_detail_2471.html' },
  { date:'2026-07-11', name:'全国環境セミナー2026 [1日目]', time:'13:00〜18:00', venue:'山形大学 小白川キャンパス（対面）', category:'zenkoku', url:'https://www.nfuca-tokyo.jp/news/news_detail_2469.html' },
  { date:'2026-07-12', name:'全国環境セミナー2026 [2日目]', time:'10:00〜12:30', venue:'山形大学 小白川キャンパス（対面）', category:'zenkoku', url:'https://www.nfuca-tokyo.jp/news/news_detail_2469.html' },
  { date:'2026-07-21', name:'かけこみ相談会 〜7月編〜', time:'18:00〜19:00', venue:'オンライン（Zoom）', category:'tokyo', url:'https://www.nfuca-tokyo.jp/news/news_detail_2470.html' },
  { date:'2026-07-31', name:'⚠️ 締切：共済セミナー展示エントリー', time:'23:59締切', venue:'', category:'zenkoku', url:'https://www.nfuca-tokyo.jp/news/news_detail_2472.html', isDeadline:true },
  { date:'2026-08-20', name:'第44回全国大学生協共済セミナー [1日目]', time:'開催', venue:'奈良県コンベンションセンター（奈良市）', category:'zenkoku', url:'https://www.nfuca-tokyo.jp/news/news_detail_2472.html' },
  { date:'2026-08-21', name:'第44回全国大学生協共済セミナー [2日目]', time:'開催', venue:'奈良県コンベンションセンター（奈良市）', category:'zenkoku', url:'https://www.nfuca-tokyo.jp/news/news_detail_2472.html' },
  { date:'2026-08-22', name:'第44回全国大学生協共済セミナー [3日目]', time:'開催', venue:'奈良県コンベンションセンター（奈良市）', category:'zenkoku', url:'https://www.nfuca-tokyo.jp/news/news_detail_2472.html' },
  { date:'2026-09-05', name:'サマースクール2026 [1日目]', time:'13:00〜（翌日16:00終了）', venue:'東京外国語大学 食堂（府中市）', category:'tokyo', url:'https://www.nfuca-tokyo.jp/news/news_detail_2464.html' },
  { date:'2026-09-06', name:'サマースクール2026 [2日目]', time:'〜16:00', venue:'東京外国語大学 食堂（府中市）', category:'tokyo', url:'https://www.nfuca-tokyo.jp/news/news_detail_2464.html' },
];

let currentYear, currentMonth;

function init() {
  const today = new Date();
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  renderLegend();
  renderCalendar();
  renderEventList();
  document.getElementById('updatedNote').textContent = '最終更新: ' + LAST_UPDATED;
}

function renderLegend() {
  document.getElementById('legend').innerHTML = Object.entries(CATEGORIES).map(([, cat]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${cat.dotColor}"></div>${cat.label}</div>`
  ).join('');
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent =
    new Date(currentYear, currentMonth, 1).toLocaleDateString('ja-JP', { year:'numeric', month:'long' });

  const container = document.getElementById('calDays');
  container.innerHTML = '';

  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  const eventMap = {};
  for (const ev of EVENTS) {
    if (!eventMap[ev.date]) eventMap[ev.date] = [];
    eventMap[ev.date].push(ev);
  }

  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'day other-month';
    el.innerHTML = `<div class="day-num">${daysInPrev - i}</div>`;
    container.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const date = new Date(currentYear, currentMonth, d);
    const dow = date.getDay();
    const isToday = date.getTime() === today.getTime();

    const el = document.createElement('div');
    el.className = 'day' + (isToday ? ' today' : '');

    let numClass = 'day-num' + (dow===0?' sun':dow===6?' sat':'');
    el.innerHTML = `<div class="${numClass}">${d}</div>`;

    const dayEvents = eventMap[dateStr] || [];
    const MAX = 3;
    for (let i = 0; i < Math.min(dayEvents.length, MAX); i++) {
      const ev = dayEvents[i];
      const cat = CATEGORIES[ev.category] || CATEGORIES.tokyo;
      const pill = document.createElement('span');
      pill.className = `event-pill ${cat.cssClass}`;
      pill.textContent = ev.name;
      pill.onclick = (e) => { e.stopPropagation(); openModal(ev); };
      el.appendChild(pill);
    }
    if (dayEvents.length > MAX) {
      const more = document.createElement('span');
      more.className = 'event-pill';
      more.style.cssText = 'background:#f1f5f9;color:#64748b;';
      more.textContent = `+${dayEvents.length - MAX}件`;
      more.onclick = () => showDayEvents(dateStr, dayEvents);
      el.appendChild(more);
    }
    container.appendChild(el);
  }

  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    const el = document.createElement('div');
    el.className = 'day other-month';
    el.innerHTML = `<div class="day-num">${d}</div>`;
    container.appendChild(el);
  }
}

function renderEventList() {
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = EVENTS
    .filter(ev => { const diff = (new Date(ev.date) - today) / 86400000; return diff >= -1 && diff <= 90; })
    .sort((a,b) => a.date.localeCompare(b.date));

  document.getElementById('eventList').innerHTML = upcoming.length === 0
    ? '<div style="color:#94a3b8;font-size:13px;padding:12px 0;">直近90日のイベントはありません</div>'
    : upcoming.map(ev => {
        const dt = new Date(ev.date + 'T00:00:00');
        const month = dt.toLocaleDateString('ja-JP', { month:'numeric' }) + '月';
        const dayN = dt.getDate();
        const wkd = ['日','月','火','水','木','金','土'][dt.getDay()];
        const wkdStyle = dt.getDay()===0?'color:#ef4444':dt.getDay()===6?'color:#3b82f6':'color:#94a3b8';
        const cat = CATEGORIES[ev.category] || CATEGORIES.tokyo;
        const isPast = new Date(ev.date) < today;
        return `
          <div class="event-card" onclick="openModal(${JSON.stringify(ev).replace(/"/g,'&quot;')})">
            <div class="event-date-block">
              <div class="event-month">${month}</div>
              <div class="event-day-num" style="${isPast?'color:#cbd5e1':''}">${dayN}</div>
              <div class="event-weekday" style="${wkdStyle}">${wkd}</div>
            </div>
            <div class="event-info">
              <span class="event-badge ${cat.cssClass}">${cat.label}</span>${ev.isDeadline?'<span class="deadline-badge">締切</span>':''}
              <div class="event-name" style="${isPast?'color:#94a3b8;text-decoration:line-through':''}">${ev.name}</div>
              <div class="event-meta">${ev.time}${ev.venue?' ・ '+ev.venue:''}</div>
              <a class="event-link" href="${ev.url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">詳細を見る →</a>
            </div>
          </div>`;
      }).join('');
}

function prevMonth() {
  currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar();
}
function nextMonth() {
  currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar();
}

function openModal(ev) {
  if (typeof ev === 'string') ev = JSON.parse(ev);
  const cat = CATEGORIES[ev.category] || CATEGORIES.tokyo;
  const dt = new Date(ev.date + 'T00:00:00');
  const dateStr = dt.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">${ev.name}</div>
    <span class="event-badge ${cat.cssClass}">${cat.label}</span>
    <div style="margin-top:12px">
      <div class="modal-row"><span class="modal-label">📅 日付</span><span>${dateStr}</span></div>
      ${ev.time?`<div class="modal-row"><span class="modal-label">🕐 時間</span><span>${ev.time}</span></div>`:''}
      ${ev.venue?`<div class="modal-row"><span class="modal-label">📍 場所</span><span>${ev.venue}</span></div>`:''}
    </div>
    <a class="modal-link" href="${ev.url}" target="_blank" rel="noopener noreferrer">詳細ページを開く →</a>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function showDayEvents(dateStr, evList) {
  const dt = new Date(dateStr + 'T00:00:00');
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">${dt.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'})} のイベント</div>
    <div style="margin-top:12px">
      ${evList.map(ev => {
        const cat = CATEGORIES[ev.category] || CATEGORIES.tokyo;
        return `<div style="padding:8px 0;border-bottom:1px solid #f1f5f9">
          <span class="event-badge ${cat.cssClass}">${cat.label}</span>
          <div style="font-size:13px;font-weight:600;margin:4px 0">${ev.name}</div>
          <div style="font-size:11px;color:#64748b">${ev.time}${ev.venue?' ・ '+ev.venue:''}</div>
          <a class="event-link" href="${ev.url}" target="_blank" rel="noopener noreferrer">詳細 →</a>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

init();
</script>
</body>
</html>
